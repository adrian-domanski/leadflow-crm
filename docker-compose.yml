version: '3.9'

services:
  postgres:
    container_name: leadcrm_postgres
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    container_name: leadcrm_backend
    build: ./backend
    restart: always
    networks:
      - shared_network
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips '*'
      "

  frontend:
    container_name: leadcrm_frontend
    build: ./frontend
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - shared_network

  caddy:
    image: caddy:2
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./store-frontend/dist:/srv/store

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
